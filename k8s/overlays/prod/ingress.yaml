apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bare-web-proxy-ingress
  annotations:
    cert-manager.io/cluster-issuer: "ca-clusterissuer"
spec:
  ingressClassName: cilium
  tls:
  - hosts:
    - bwproxy.cluster.wpc
    secretName: bare-web-proxy-tls-secret
  rules:
  - host: bwproxy.cluster.wpc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bare-web-proxy-service
            port:
              number: 80
