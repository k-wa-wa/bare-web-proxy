apiVersion: apps/v1
kind: Deployment
metadata:
  name: bare-web-proxy-mock
  labels:
    app: bare-web-proxy-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bare-web-proxy-mock
  template:
    metadata:
      labels:
        app: bare-web-proxy-mock
    spec:
      containers:
      - name: mock-server
        image: bare-web-proxy-mock:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: bare-web-proxy-mock-service
spec:
  type: ClusterIP
  selector:
    app: bare-web-proxy-mock
  ports:
  - protocol: TCP
    port: 3003
    targetPort: 3003
