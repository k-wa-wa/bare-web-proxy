apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- mockserver.yaml
images:
- name: ghcr.io/k-wa-wa/bare-web-proxy
  newName: bare-web-proxy
  newTag: local

patches:
- target:
    kind: Deployment
    name: bare-web-proxy
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bare-web-proxy
    spec:
      template:
        spec:
          containers:
          - name: proxy-app
            imagePullPolicy: IfNotPresent
