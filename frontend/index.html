<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bare Web Proxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* 綺麗なグラデーションサークル背景 */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            filter: blur(80px);
            z-index: 0;
        }
        body::before {
            top: 15%;
            left: 15%;
        }
        body::after {
            bottom: 15%;
            right: 15%;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .logo-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            font-weight: 300;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .url-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .submit-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .test-links {
            margin-top: 15px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .test-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .test-link {
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .test-link:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            min-height: 20px;
            transition: opacity 0.2s ease;
            opacity: 0;
        }

        .error-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <h1 class="logo-title">Bare Web Proxy</h1>
            <p class="logo-subtitle">Go & Headless Chrome サイドカーによる、通信容量を極限まで削減する超軽量Webプロキシ。</p>
        </div>

        <form id="proxyForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" id="urlInput" class="url-input" placeholder="https://example.com" required autocomplete="off">
                </div>
                <div id="errorArea" class="error-message"></div>
                <button type="submit" class="submit-btn">Go Proxy</button>
            </div>
        </form>

        <div class="test-links">
            <span class="test-title">ローカル疎通検証用リンク</span>
            <a href="/proxy?url=http%3A%2F%2F127.0.0.1%3A3000%2Fdummy" class="test-link">
                📄 ダミーのテストページ (/dummy) を経由して表示
            </a>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const input = document.getElementById('urlInput');
            const errorArea = document.getElementById('errorArea');
            let urlVal = input.value.trim();

            if (!urlVal) return;

            let targetURL = urlVal;

            // URLかどうかの簡易判定
            if (/^https?:\/\//i.test(urlVal)) {
                // スキームがすでに明示されている場合
                try {
                    new URL(urlVal);
                } catch (e) {
                    errorArea.textContent = '有効なURLを入力してください（例: https://example.com）';
                    errorArea.classList.add('show');
                    return;
                }
            } else {
                // スキームがない場合、ドメイン/ホスト名らしいか判定
                // スペースを含まず、かつ「ドットを含む」か「localhost」である場合はURLとみなす
                const isDomain = !/\s/.test(urlVal) && (urlVal.includes('.') || urlVal.startsWith('localhost'));
                if (isDomain) {
                    targetURL = 'http://' + urlVal;
                    try {
                        new URL(targetURL);
                    } catch (e) {
                        // URLとして無効な場合はDuckDuckGo検索クエリとする
                        targetURL = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(urlVal);
                    }
                } else {
                    // それ以外はDuckDuckGo検索クエリとする
                    targetURL = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(urlVal);
                }
            }

            errorArea.classList.remove('show');
            // プロキシURLへリダイレクト
            window.location.href = '/proxy?url=' + encodeURIComponent(targetURL);
        }
    </script>
</body>
</html>
