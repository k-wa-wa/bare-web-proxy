<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
    <title>Bare Web Proxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #121214;
            --border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #ffffff;
            --accent-hover: #e4e4e7;
            --input-bg: #09090b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 32px;
            text-align: left;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.6;
            font-weight: 400;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-wrapper {
            position: relative;
        }

        .url-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .url-input:focus {
            border-color: var(--text-secondary);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .url-input::placeholder {
            color: var(--text-muted);
        }

        .submit-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent);
            color: var(--bg);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.1s ease;
            text-align: center;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Bare Web Proxy</h1>
            <p class="subtitle">Go & Headless Chrome サイドカーによる、通信容量を極限まで削減する超軽量Webプロキシ。</p>
        </div>

        <form id="proxyForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" id="urlInput" class="url-input" placeholder="https://example.com" required
                        autocomplete="off">
                </div>
                <button type="submit" class="submit-btn">Go Proxy</button>
            </div>
        </form>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const input = document.getElementById('urlInput');
            const val = input.value.trim();
            if (!val) return;
            window.location.href = '/proxy?q=' + encodeURIComponent(val);
        }
    </script>
</body>

</html>
